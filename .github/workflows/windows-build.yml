name: Build Windows package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows 11 x64
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check:windows

      - name: Build Windows package
        run: npm run package:win

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ChatMonJA-${{ github.ref_name }}-windows-x64-unsigned
          path: out/ChatMonJA-*-windows-x64-unsigned.zip
          if-no-files-found: error
          retention-days: 14
